# Connection string the app reads as OPS_PG_DSN. In-cluster it points at the
# pgvector StatefulSet pod via its headless Service DNS name.
#
# For AWS RDS instead: replace the host with the RDS endpoint and put the real
# password here (or, better, source it from AWS Secrets Manager via the External
# Secrets Operator — see docs/AWS_DEPLOY.md). ANTHROPIC_API_KEY is optional;
# omit it and the narrated answer falls back to the deterministic rollup.
apiVersion: v1
kind: Secret
metadata:
  name: ops-center-secrets
  namespace: ops-center
type: Opaque
stringData:
  OPS_PG_DSN: "postgresql://ops:ops@pgvector-0.pgvector.ops-center.svc.cluster.local:5432/opsrag"
  # ANTHROPIC_API_KEY: "sk-ant-..."
