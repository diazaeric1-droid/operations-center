name: evals

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  eval-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Generate synthetic fleet
        run: python data/synthetic/generate.py
      - name: Unit tests
        run: pytest -q
      - name: Reason-code classifier eval gate (fails < 80%)
        run: python -m evals.run_evals
      - name: Quantity-recovery eval gate (deferred-bbl error vs ground truth, both cadences)
        run: python -m evals.quantity_recovery
