name: daily-brief-email

# Emails the Operations Center morning brief every morning.
# Configure the SMTP secrets under Settings → Secrets and variables → Actions:
#   SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS, BRIEF_FROM, BRIEF_TO
# (BRIEF_OIL_PRICE / BRIEF_NRI / BRIEF_SUBJECT optional). The job no-ops cleanly if SMTP_HOST
# is unset, so the workflow can be committed before secrets are wired.

on:
  schedule:
    # 12:30 UTC daily ≈ 06:30 US Central (standard) / 07:30 (daylight) — a foreman's 6:30am brief.
    - cron: "30 12 * * *"
  workflow_dispatch: {}

# Prevent overlapping manual + scheduled runs from double-sending the brief.
concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  send:
    name: compose + email the morning brief
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -r requirements.txt
      - name: Send the morning brief
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          BRIEF_FROM: ${{ secrets.BRIEF_FROM }}
          BRIEF_TO: ${{ secrets.BRIEF_TO }}
          BRIEF_OIL_PRICE: ${{ secrets.BRIEF_OIL_PRICE }}
          BRIEF_NRI: ${{ secrets.BRIEF_NRI }}
          BRIEF_SUBJECT: ${{ secrets.BRIEF_SUBJECT }}
        run: |
          if [ -z "$SMTP_HOST" ]; then
            echo "SMTP_HOST not set — skipping send (wire the Action secrets to enable)."
            exit 0
          fi
          python scripts/daily_brief_email.py
