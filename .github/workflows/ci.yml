name: ci

on:
  push:
  pull_request:
  workflow_dispatch: {}

jobs:
  test:
    name: bootstrap + pytest (py3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -r requirements.txt pytest
      - name: Bootstrap (generate fleets + train the ESP risk model)
        run: python -c "import core; core.bootstrap()"
      - name: Tests
        run: python -m pytest -q
